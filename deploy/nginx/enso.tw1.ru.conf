# ============================================================
# Nginx — обратный прокси для приложения "Энсо"
# Файл: /etc/nginx/sites-available/enso.tw1.ru
# Активация: ln -s /etc/nginx/sites-available/enso.tw1.ru /etc/nginx/sites-enabled/
# ============================================================

# HTTP -> редирект на HTTPS (после получения SSL-сертификата certbot
# добавит сюда блок автоматически; до этого момента сайт будет работать
# по http)
server {
    listen 80;
    listen [::]:80;
    server_name enso.tw1.ru;

    # Для проверки certbot http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Всё остальное проксируем (или редиректим — после получения сертификата
    # certbot заменит этот блок автоматически)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / HMR (на проде не нужен, но не помешает)
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout  300;
        proxy_send_timeout  300;
        client_max_body_size 25m;
    }
}

# ============================================================
# После запуска `certbot --nginx -d enso.tw1.ru` certbot
# автоматически создаст ниже блок server { listen 443 ssl ... }
# и переведёт http-блок выше в режим редиректа на https.
# Ничего вручную править не нужно.
# ============================================================
